[remote.github]
owner = "vki1024gs"
repo = "MaaPTCGP"

[changelog]
header = """
# MaaPTCGP Release Notes
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
        {% if commit.breaking %}**Breaking**: {% endif %}\
        {{ commit.message | split(pat="\n") | first | upper_first }}
        {%- if commit.footers -%}
            {%- for footer in commit.footers -%}
                {%- if footer.token == "Co-authored-by" -%}
                    {%- set co_author_name = footer.value | split(pat=" <") | first | trim %} @{{ co_author_name }}
                {%- endif -%}
            {%- endfor -%}
        {%- endif %}
{% endmacro -%}

{% if version %}\
    ## {{ version }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## 未发布
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ## {{ group | striptags | trim | upper_first }}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {% for commit in commits %}
        {%- if not commit.scope -%}
            {{ self::print_commit(commit=commit) }}
        {% endif -%}
    {% endfor -%}
{% endfor -%}

## ⚠️ 使用提示

- 请在下方 Assets 中选择与你的系统匹配的 MaaPTCGP 安装包。
- macOS 用户可下载 tar.gz 或 dmg；macOS 版目前未进行 Apple 公证，首次打开时可能被系统拦截。若确认来源可信，可前往“系统设置 -> 隐私与安全性”并在一小时内选择“仍要打开”，或对解压后的目录执行 `xattr -dr com.apple.quarantine <MaaPTCGP目录>` 后再打开。
- Windows 用户下载 zip，Linux 用户下载 tar.gz。
- 升级后如任务配置异常，建议在 MXU 中重新检查资源、控制器与任务选项。
- 对战、分送等开发中任务默认不会在基础日常任务中自动勾选，首次使用建议先单独运行。
- 任务栏自动领取等小工具仍在开发中，可能不稳定；首次使用建议先单独运行。
- 当前项目仍在持续开发中，遇到问题请通过 README 中的联系方式反馈。

{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ## 新贡献者
{% endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif %}
"""

# 尾部
footer = """
"""

[git]
# 过滤提交
conventional_commits = true # 使用约定式提交格式
filter_unconventional = false # 不过滤非约定式提交
# 启用完整的 commit 信息
split_commits = false
# 保留完整的 commit body
protect_breaking_commits = false
commit_parsers = [
    # 跳过包含 [skip changelog] 的 commit
    { message = ".*\\[skip changelog\\].*", skip = true },
    { body = ".*\\[skip changelog\\].*", skip = true },
    { message = "^feat", group = "<!-- 0 -->✨ 新功能" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug 修复" },
    { message = "^perf", group = "<!-- 2 -->🚀 体验优化" },
    { message = "^docs", group = "<!-- 3 -->📚 文档" },
    { message = "^refactor", group = "<!-- 4 -->🧰 开发者说明" },
    { message = "^ci", group = "<!-- 5 -->🧰 发布与构建" },
    { message = "^test", group = "<!-- 6 -->🧪 测试" },
    { message = "^chore\\(fun\\)", group = "<!-- 7 -->🐑 发癫" },
    { message = "^chore\\(deps\\)", group = "<!-- 8 -->📦 依赖更新" },
    { message = "^chore", group = "<!-- 9 -->🧰 维护" },
    { body = ".*security", group = "<!-- 10 -->🔒 安全" },
    { message = "^revert", group = "<!-- 11 -->◀️ 撤销" },
]

# 忽略这些提交
ignore_tags = "rc"

# 排序规则
sort_commits = "oldest"

# 启用GitHub集成
[git.github]
commits = true
